<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innovative-search</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        color: white;
        background-color: rgb(98, 96, 96);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .head {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .search-simple {
        border: 2px solid rgb(0, 0, 0);
        border-radius: 10px;
        padding: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        flex-direction: column;
      }
      #s1,
      #s2,
      #s3,
      #s4,
      #s5,
      #s6,
      #s7,
      #s8,
      #s9,
      #s10,
      #s11 {
        padding: 10px;
        border-radius: 10px;
        border: none;
      }
      #b1,
      #b2,
      #b3,
      #b4,
      #b5,
      #b6,
      #b7,
      #b8,
      #b9,
      #b10,
      #b11 {
        padding: 10px;
        border-radius: 10px;
        border: none;
        background-color: rgb(0, 0, 0);
        color: white;
      }
      #b1:hover,
      #b2:hover,
      #b3:hover,
      #b4:hover,
      #b5:hover,
      #b6:hover,
      #b7:hover,
      #b8:hover,
      #b9:hover,
      #b10:hover,
      #b11:hover {
        background-color: rgb(255, 255, 255);
        color: black;
        cursor: pointer;
      }
      .head-1,
      .head-2,
      .head-3,
      .head-4 {
        display: flex;
        flex-direction: row;
        gap: 10px;
      }
      
      .parent {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .bottom-search {
        width: 100%;
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .first,
      .second {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .first input,
      .second input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
      }

      #suggestions,
      #sujjestions1 {
        list-style: none;
        margin: 0;
        padding: 0;
        background: white;
        color: black;
        width: 100%;
        border-radius: 5px;
      }

      #suggestions li,
      #sujjestions1 li {
        padding: 8px;
        cursor: pointer;
      }

      #suggestions li:hover,
      #sujjestions1 li:hover {
        background: lightgray;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="head">
        <div class="head-1">
          <div class="search-simple">
            <h3>Google</h3>
            <input type="search" placeholder="Search Here" id="s1" />
            <button id="b1">Search</button>
          </div>

          <div class="search-simple">
            <h3>Google Gemini</h3>
            <input type="search" placeholder="Search Here" id="s2" />
            <button id="b2">Search</button>
          </div>

          <div class="search-simple">
            <h3>ChatGPT</h3>
            <input type="search" placeholder="Search Here" id="s3" />
            <button id="b3">Search</button>
          </div>
        </div>

        <div class="head-2">
          <div class="search-simple">
            <h3>Microsoft Edge</h3>
            <input type="search" placeholder="Search Here" id="s4" />
            <button id="b4">Search</button>
          </div>

          <div class="search-simple">
            <h3>DeepSeek</h3>
            <input type="search" placeholder="Search Here" id="s5" />
            <button id="b5">Search</button>
          </div>

          <div class="search-simple">
            <h3>GitHub</h3>
            <input type="search" placeholder="Search Here" id="s6" />
            <button id="b6">Search</button>
          </div>
        </div>

        <div class="head-3">
          <div class="search-simple">
            <h3>YouTube</h3>
            <input type="search" placeholder="Search Here" id="s7" />
            <button id="b7">Search</button>
          </div>

          <div class="search-simple">
            <h3>Wikipedia</h3>
            <input type="search" placeholder="Search Here" id="s8" />
            <button id="b8">Search</button>
          </div>

          <div class="search-simple">
            <h3>Amazon</h3>
            <input type="search" placeholder="Search Here" id="s9" />
            <button id="b9">Search</button>
          </div>
        </div>
      </div>
      <div class="bottom-search">
        <div class="first">
          <input type="search" placeholder="Search Here" id="s10" />
          <ul id="suggestions"></ul>
        </div>

        <div class="second">
          <input
            type="search"
            placeholder="enter here for search cricket info"
            id="s11"
          />
          <ul id="sujjestions1"></ul>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
